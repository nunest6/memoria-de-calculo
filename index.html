// SUPABASE — Integração com a tabela `clientes`
// ══════════════════════════════════════════════════════════════════════════

const SUPA_URL    = 'https://jvhkczdtfulegikcpiov.supabase.co';
const SUPA_ANON   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2aGtjemR0ZnVsZWdpa2NwaW92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTkxNjEsImV4cCI6MjA4ODczNTE2MX0.HEETVDQUNJRLG8GusxhcZ8kmxx9Uo9JoBB0MoSUdjTg';
const SUPA_HEADERS = { 'apikey': SUPA_ANON, 'Authorization': `Bearer ${SUPA_ANON}`, 'Content-Type': 'application/json' };

// Dados do cliente ativo (preenchidos após seleção)
let clienteAtivo = {
  id: null,
  nome: 'Demo LTDA',
  cnpj: null,
  regime: null,
  sci: null,
  // campos raw da tabela — preenchidos automaticamente após descoberta dos campos
  _raw: {}
};

// Mapa de campos — detectado automaticamente na primeira chamada
let camposCliente = null;

// ── Chamada genérica à API REST do Supabase ──────────────────────────────
async function supaFetch(endpoint, params = '') {
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/${endpoint}${params}`, { headers: SUPA_HEADERS });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (e) {
    console.error('[Supabase]', e);
    return null;
  }
}

// ── Detecta automaticamente os campos relevantes na tabela ───────────────
// Estratégia: busca 1 linha e inspeciona as keys retornadas
async function detectarCampos() {
  if (camposCliente) return camposCliente; // cache
  const rows = await supaFetch('clientes', '?limit=1&select=*');
  if (!rows || rows.length === 0) return null;
  const keys = Object.keys(rows[0]);

  // Heurística de mapeamento: procura por nomes comuns para cada campo
  const find = (...candidates) => keys.find(k => candidates.some(c => k.toLowerCase().includes(c.toLowerCase()))) || null;

  camposCliente = {
    id:     find('id'),
    nome:   find('nome', 'razao', 'empresa', 'name'),
    cnpj:   find('cnpj'),
    regime: find('regime', 'tributario', 'enquadramento', 'tipo_regime', 'modalidade'),
    sci:    find('sci', 'codigo_sci', 'cod_sci', 'codigo', 'codigo_cliente', 'client_code'),
    _all:   keys
  };

  console.log('[Supabase] Campos detectados:', camposCliente);
  return camposCliente;
}

// ── Busca clientes por nome (autocomplete) ───────────────────────────────
async function buscarClientes(termo) {
  const campos = await detectarCampos();
  if (!campos || !campos.nome) return [];
  const enc = encodeURIComponent(termo);
  const rows = await supaFetch('clientes', `?${campos.nome}=ilike.*${enc}*&limit=10&select=*`);
  return rows || [];
}

// ── Carrega todos os clientes (para o dropdown inicial) ──────────────────
async function carregarListaClientes() {
  const campos = await detectarCampos();
  if (!campos || !campos.nome) return [];
  const rows = await supaFetch('clientes', `?select=*&order=${campos.nome}.asc&limit=200`);
  return rows || [];
}

// ── Ativa um cliente pelo objeto row retornado do Supabase ───────────────
function ativarCliente(row) {
  const c = camposCliente;
  clienteAtivo = {
    id:     c.id     ? row[c.id]     : null,
    nome:   c.nome   ? row[c.nome]   : 'Cliente',
    cnpj:   c.cnpj   ? row[c.cnpj]  : null,
    regime: c.regime ? row[c.regime] : null,
    sci:    c.sci    ? row[c.sci]    : null,
    _raw:   row
  };
  atualizarHeaderCliente();
  render();
}

// ── Atualiza o header com os dados do cliente ativo ──────────────────────
function atualizarHeaderCliente() {
  const { nome, cnpj, regime, sci } = clienteAtivo;

  // Nome da empresa no input
  const inputNome = document.getElementById('sel-cliente');
  if (inputNome) inputNome.value = nome || '';

  // Bloco de info do cliente no header
  const infoEl = document.getElementById('cliente-info-header');
  if (infoEl) {
    const regimeLabel = formatarRegime(regime);
    infoEl.innerHTML = `
      <div class="cli-nome">${nome || '–'}</div>
      <div class="cli-meta">
        ${cnpj  ? `<span class="cli-tag">CNPJ <strong>${formatarCNPJ(cnpj)}</strong></span>` : ''}
        ${sci   ? `<span class="cli-tag">SCI <strong>${sci}</strong></span>` : ''}
        ${regime? `<span class="cli-tag cli-regime">${regimeLabel}</span>` : ''}
      </div>`;
  }

  // Status pill com o regime
  const pillEl = document.getElementById('status-regime');
  if (pillEl) {
    pillEl.textContent = formatarRegime(regime) || 'Sem Regime';
  }

  // Atualiza o logo-sub
  const subEl = document.querySelector('.logo-sub');
  if (subEl) subEl.textContent = 'Memória de Cálculo Fiscal';
}

// ── Helpers de formatação ─────────────────────────────────────────────────
function formatarCNPJ(v) {
  if (!v) return '';
  const d = String(v).replace(/\D/g, '');
  if (d.length !== 14) return String(v);
  return `${d.slice(0,2)}.${d.slice(2,5)}.${d.slice(5,8)}/${d.slice(8,12)}-${d.slice(12)}`;
}

function formatarRegime(regime) {
  if (!regime) return null;
  const r = String(regime).toLowerCase().trim();
  if (r.includes('presumido'))  return 'Lucro Presumido';
  if (r.includes('real'))       return 'Lucro Real';
  if (r.includes('simples'))    return 'Simples Nacional';
  if (r.includes('mei'))        return 'MEI';
  if (r.includes('imune'))      return 'Imune / Isento';
  return regime; // devolve original se não reconhecer
}

// ══════════════════════════════════════════════════════════════════════════
// AUTOCOMPLETE — Seletor de cliente
// ══════════════════════════════════════════════════════════════════════════

let autocompleteTimeout = null;
let listaClientesCache  = [];

function initSeletorCliente() {
  const input   = document.getElementById('sel-cliente');
  const dropdown= document.getElementById('cliente-dropdown');
  if (!input || !dropdown) return;

  // Carrega lista inicial ao focar
  input.addEventListener('focus', async () => {
    if (listaClientesCache.length === 0) {
      dropdown.innerHTML = `<div class="cli-drop-loading">Carregando clientes...</div>`;
      dropdown.style.display = 'block';
      listaClientesCache = await carregarListaClientes();
    }
    renderDropdown(listaClientesCache, dropdown);
    dropdown.style.display = 'block';
  });

  // Filtra ao digitar
  input.addEventListener('input', () => {
    clearTimeout(autocompleteTimeout);
    const termo = input.value.trim();
    autocompleteTimeout = setTimeout(async () => {
      let lista;
      if (termo.length < 2) {
        lista = listaClientesCache;
      } else {
        lista = await buscarClientes(termo);
      }
      renderDropdown(lista, dropdown);
      dropdown.style.display = 'block';
    }, 280);
  });

  // Fecha ao clicar fora
  document.addEventListener('click', (e) => {
    if (!input.contains(e.target) && !dropdown.contains(e.target)) {
      dropdown.style.display = 'none';
    }
  });

  // Navegação por teclado
  input.addEventListener('keydown', (e) => {
    const items = dropdown.querySelectorAll('.cli-drop-item');
    const active = dropdown.querySelector('.cli-drop-item.focused');
    let idx = Array.from(items).indexOf(active);
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (idx < items.length - 1) { if (active) active.classList.remove('focused'); items[idx+1].classList.add('focused'); items[idx+1].scrollIntoView({block:'nearest'}); }
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (idx > 0) { if (active) active.classList.remove('focused'); items[idx-1].classList.add('focused'); items[idx-1].scrollIntoView({block:'nearest'}); }
    } else if (e.key === 'Enter' && active) {
      e.preventDefault();
      active.click();
    } else if (e.key === 'Escape') {
      dropdown.style.display = 'none';
    }
  });
}

function renderDropdown(lista, dropdown) {
  const c = camposCliente;
  if (!lista || lista.length === 0) {
    dropdown.innerHTML = `<div class="cli-drop-empty">Nenhum cliente encontrado</div>`;
    return;
  }
  dropdown.innerHTML = lista.map(row => {
    const nome   = c && c.nome   ? row[c.nome]   : JSON.stringify(row);
    const cnpj   = c && c.cnpj   ? row[c.cnpj]   : '';
    const regime = c && c.regime ? row[c.regime]  : '';
    const sci    = c && c.sci    ? row[c.sci]     : '';
    return `<div class="cli-drop-item" onclick="selecionarCliente(${JSON.stringify(JSON.stringify(row))})">
      <div class="cli-drop-nome">${nome || '–'}</div>
      <div class="cli-drop-meta">
        ${cnpj   ? `<span>CNPJ: ${formatarCNPJ(cnpj)}</span>` : ''}
        ${regime ? `<span>${formatarRegime(regime)}</span>` : ''}
        ${sci    ? `<span>SCI: ${sci}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function selecionarCliente(rowStr) {
  const row = JSON.parse(rowStr);
  ativarCliente(row);
  document.getElementById('cliente-dropdown').style.display = 'none';
}

// ── Inicializa após o DOM estar pronto ────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await detectarCampos();
  initSeletorCliente();
});
